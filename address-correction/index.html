<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Correct delivery address — Fatima Bakery ATX</title><link rel="icon" type="image/png" href="/images/logo.png"><style>body{font-family:Georgia,serif;background:#faf7ee;color:#1c1a14;max-width:680px;margin:0 auto;padding:2rem;line-height:1.6}label{display:block;margin-top:1rem}input,textarea,button{font:inherit;width:100%;padding:.75rem}button{background:#2a3d28;color:#f5eed8;border:0;margin-top:1.5rem}.status{margin-top:1rem}</style></head><body><main><h1>Correct delivery address</h1><p>Enter the corrected Thursday delivery address. This link is single-use and expires after 24 hours.</p><form id="address-form"><input type="hidden" name="order_type" value="address_correction"><input type="hidden" name="address_token" id="address-token"><label for="delivery-address1">Delivery Address 1</label><input id="delivery-address1" name="delivery_address1" autocomplete="address-line1" required><label for="delivery-address2">Delivery Address 2 (optional)</label><input id="delivery-address2" name="delivery_address2" autocomplete="address-line2"><label for="delivery-city">City</label><input id="delivery-city" name="delivery_city" autocomplete="address-level2" required><label for="delivery-state">State</label><input id="delivery-state" name="delivery_state" autocomplete="address-level1" value="TX" required maxlength="2"><label for="delivery-zip">ZIP</label><input id="delivery-zip" name="delivery_zip" autocomplete="postal-code" required><label for="delivery-instructions">Delivery Instructions (optional)</label><textarea id="delivery-instructions" name="delivery_instructions" rows="3"></textarea><button type="submit">Submit corrected address</button><p id="status" class="status" role="status"></p></form></main><script>const form=document.getElementById('address-form'),statusEl=document.getElementById('status'),token=new URLSearchParams(location.search).get('token')||'';document.getElementById('address-token').value=token;form.addEventListener('submit',async e=>{e.preventDefault();statusEl.textContent='Sending…';const payload=Object.fromEntries(new FormData(form).entries());try{const res=await fetch('/api/order',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});const body=await res.json();if(!res.ok||body.status==='error')throw new Error(body.message||'Address update failed.');statusEl.textContent=body.message||'Address update received.';form.reset()}catch(err){statusEl.textContent=err.message||'Address update failed.'}});</script></body></html>

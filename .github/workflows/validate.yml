name: Validate Fatima Bakery Site

on:
  pull_request:
    branches: [ main ]
  push:
    branches:
      - "week*"
      - "update-*"
      - "fix-*"
      - "add-*"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure scripts are executable
        run: |
          chmod +x scripts/*.sh || true

      - name: Run local validation script
        run: |
          ./scripts/validate-site.sh

      - name: Create maintenance report preview
        run: |
          ./scripts/create-maintenance-report.sh
          cat reports/weekly/latest.md
